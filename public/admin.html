<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoveCourt 管理頁</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
        background: #fff6fa;
        color: #2a2a2a;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px 16px 40px;
      }
      h1 {
        margin: 0 0 8px;
        color: #c2185b;
        font-size: 28px;
      }
      .hint {
        margin: 0 0 16px;
        color: #6d5a66;
        font-size: 14px;
      }
      .toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .toolbar input,
      .toolbar select,
      .toolbar button {
        border: 1px solid #d8bfd0;
        border-radius: 10px;
        padding: 8px 10px;
        font-size: 14px;
        background: #fff;
      }
      .toolbar button {
        cursor: pointer;
        background: #ffe2f0;
      }
      .table-wrap {
        background: #fff;
        border: 1px solid #f2d7e6;
        border-radius: 12px;
        overflow: auto;
        box-shadow: 0 2px 12px rgba(194, 24, 91, 0.08);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 1400px;
      }
      td.long {
        max-width: 260px;
        word-break: break-word;
        white-space: pre-wrap;
      }
      th,
      td {
        border-bottom: 1px solid #f1e3eb;
        padding: 10px;
        text-align: left;
        vertical-align: top;
        font-size: 13px;
        line-height: 1.5;
      }
      th {
        position: sticky;
        top: 0;
        background: #ffeef6;
        z-index: 1;
      }
      tr:hover td {
        background: #fff9fc;
      }
      .small {
        color: #8b7281;
        font-size: 12px;
      }
      .empty {
        padding: 20px;
        color: #8b7281;
      }
      .zoom-btn {
        width: 100%;
        border: 1px solid #ead3df;
        border-radius: 8px;
        background: #fff;
        color: #4d3b46;
        font-size: 12px;
        line-height: 1.5;
        text-align: left;
        padding: 8px;
        cursor: zoom-in;
      }
      .zoom-btn:hover {
        background: #fff6fb;
      }
      .zoom-modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(35, 20, 30, 0.55);
        z-index: 9999;
      }
      .zoom-modal.show {
        display: flex;
      }
      .zoom-panel {
        width: min(920px, 96vw);
        max-height: 85vh;
        overflow: auto;
        background: #fff;
        border-radius: 14px;
        border: 1px solid #edd8e3;
        box-shadow: 0 12px 36px rgba(30, 10, 20, 0.25);
        padding: 14px;
      }
      .zoom-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }
      .zoom-title {
        margin: 0;
        color: #c2185b;
        font-size: 16px;
      }
      .zoom-close {
        border: 1px solid #e4cad7;
        border-radius: 8px;
        background: #fff7fb;
        color: #7b5167;
        padding: 6px 10px;
        cursor: pointer;
      }
      .zoom-content {
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.75;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>LoveCourt MongoDB 管理頁</h1>
      <p class="hint">
        顯示最近 300 筆判決資料；含調停申請、對方答辯、和解書與行為紀錄。可搜尋與分類篩選。
      </p>

      <div class="toolbar">
        <input id="keyword" type="text" placeholder="搜尋：心事、對象、判決、答辯、和解書..." />
        <select id="category">
          <option value="">全部分類</option>
        </select>
        <select id="mediation-filter">
          <option value="">調停：全部</option>
          <option value="yes">已申請調停</option>
          <option value="no">未申請調停</option>
        </select>
        <button id="refresh-btn" type="button">重新整理</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>時間</th>
              <th>申請調停</th>
              <th>調停狀態</th>
              <th>戀愛心事</th>
              <th>控訴對象</th>
              <th>分類</th>
              <th>判決</th>
              <th>對方答辯</th>
              <th>和解書</th>
              <th>行為紀錄</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
        <div id="empty" class="empty" hidden>目前沒有符合資料</div>
      </div>
    </main>
    <div id="zoom-modal" class="zoom-modal" aria-hidden="true">
      <div class="zoom-panel">
        <div class="zoom-head">
          <h3 id="zoom-title" class="zoom-title">內容放大檢視</h3>
          <button id="zoom-close" class="zoom-close" type="button">關閉</button>
        </div>
        <div id="zoom-content" class="zoom-content"></div>
      </div>
    </div>

    <script>
      const bodyEl = document.getElementById("table-body");
      const emptyEl = document.getElementById("empty");
      const keywordEl = document.getElementById("keyword");
      const categoryEl = document.getElementById("category");
      const mediationFilterEl = document.getElementById("mediation-filter");
      const refreshBtn = document.getElementById("refresh-btn");
      const zoomModalEl = document.getElementById("zoom-modal");
      const zoomTitleEl = document.getElementById("zoom-title");
      const zoomContentEl = document.getElementById("zoom-content");
      const zoomCloseEl = document.getElementById("zoom-close");

      let allRows = [];

      function escapeHtml(input) {
        return String(input || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function toLocalTime(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return "";
        return d.toLocaleString("zh-TW");
      }

      function mediationStatusLabel(m) {
        if (!m) return "—";
        if (m.status === "responded") return "已完成";
        if (m.status === "created") return "調解中";
        return m.status || "—";
      }

      function formatEvents(events) {
        if (!events || !events.length) return "—";
        return events
          .map((e) => {
            const t = toLocalTime(e.at);
            const d = e.detail ? ` ${e.detail}` : "";
            return `${t} ${e.action || ""}${d}`;
          })
          .join("\n");
      }

      function renderCategoryOptions(data) {
        const set = new Set(data.map((x) => x.category).filter(Boolean));
        const categories = Array.from(set).sort((a, b) => a.localeCompare(b, "zh-Hant"));
        categoryEl.innerHTML =
          '<option value="">全部分類</option>' +
          categories.map((c) => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");
      }

      function filterRows() {
        const keyword = keywordEl.value.trim().toLowerCase();
        const category = categoryEl.value.trim();
        const medFilter = mediationFilterEl.value;
        return allRows.filter((row) => {
          if (category && row.category !== category) return false;
          const hasMed = Boolean(row.mediation || row.mediationAppliedAt);
          if (medFilter === "yes" && !hasMed) return false;
          if (medFilter === "no" && hasMed) return false;
          if (!keyword) return true;
          const m = row.mediation;
          const haystack = [
            row.story || row.complaint || "",
            row.accused || "",
            row.category || "",
            row.judgement || row.rawVerdict || "",
            m?.response || "",
            m?.settlementText || "",
            formatEvents(m?.events),
          ]
            .join(" ")
            .toLowerCase();
          return haystack.includes(keyword);
        });
      }

      function renderTable() {
        const rows = filterRows();
        bodyEl.innerHTML = rows
          .map((item) => {
            const story = item.story || item.complaint || "";
            const judgement = item.judgement || item.rawVerdict || "";
            const m = item.mediation;
            const applied =
              item.mediationAppliedAt || m
                ? `是<br><span class="small">${escapeHtml(
                    toLocalTime(item.mediationAppliedAt || m?.createdAt)
                  )}</span>`
                : "否";
            const responseText = m?.response || "";
            const settlementText = m?.settlementText || "";
            const eventsText = formatEvents(m?.events);
            const shortResponse = responseText ? responseText.slice(0, 60) : "—";
            const shortSettlement = settlementText ? settlementText.slice(0, 60) : "—";
            const shortEvents = eventsText ? eventsText.slice(0, 60) : "—";
            return `<tr>
              <td><div>${escapeHtml(toLocalTime(item.createdAt))}</div><div class="small">${escapeHtml(item._id || "")}</div></td>
              <td>${applied}</td>
              <td>${escapeHtml(mediationStatusLabel(m))}</td>
              <td class="long">${escapeHtml(story)}</td>
              <td>${escapeHtml(item.accused || "—")}</td>
              <td>${escapeHtml(item.category || "—")}</td>
              <td class="long">${escapeHtml(judgement)}</td>
              <td class="long">
                <button type="button" class="zoom-btn" data-title="對方答辯" data-content="${escapeHtml(responseText || "—")}">${escapeHtml(shortResponse)}${responseText.length > 60 ? "..." : ""}</button>
              </td>
              <td class="long">
                <button type="button" class="zoom-btn" data-title="和解書全文" data-content="${escapeHtml(settlementText || "—")}">${escapeHtml(shortSettlement)}${settlementText.length > 60 ? "..." : ""}</button>
              </td>
              <td class="long">
                <button type="button" class="zoom-btn" data-title="行為紀錄" data-content="${escapeHtml(eventsText || "—")}">${escapeHtml(shortEvents)}${eventsText.length > 60 ? "..." : ""}</button>
              </td>
            </tr>`;
          })
          .join("");
        emptyEl.hidden = rows.length !== 0;
      }

      function openZoom(title, content) {
        zoomTitleEl.textContent = title || "內容放大檢視";
        zoomContentEl.textContent = content || "—";
        zoomModalEl.classList.add("show");
        zoomModalEl.setAttribute("aria-hidden", "false");
      }

      function closeZoom() {
        zoomModalEl.classList.remove("show");
        zoomModalEl.setAttribute("aria-hidden", "true");
      }

      async function loadData() {
        refreshBtn.disabled = true;
        refreshBtn.textContent = "讀取中...";
        try {
          const res = await fetch("/api/admin-data");
          if (!res.ok) throw new Error("讀取失敗");
          allRows = await res.json();
          renderCategoryOptions(allRows);
          renderTable();
        } catch (err) {
          console.error(err);
          bodyEl.innerHTML = "";
          emptyEl.hidden = false;
          emptyEl.textContent = "資料讀取失敗，請確認 MongoDB 與後端服務是否正常。";
        } finally {
          refreshBtn.disabled = false;
          refreshBtn.textContent = "重新整理";
        }
      }

      keywordEl.addEventListener("input", renderTable);
      categoryEl.addEventListener("change", renderTable);
      mediationFilterEl.addEventListener("change", renderTable);
      refreshBtn.addEventListener("click", loadData);
      bodyEl.addEventListener("click", (event) => {
        const btn = event.target.closest(".zoom-btn");
        if (!btn) return;
        openZoom(btn.dataset.title, btn.dataset.content);
      });
      zoomCloseEl.addEventListener("click", closeZoom);
      zoomModalEl.addEventListener("click", (event) => {
        if (event.target === zoomModalEl) closeZoom();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeZoom();
      });
      loadData();
    </script>
  </body>
</html>
