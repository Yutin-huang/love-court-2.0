<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>戀愛法庭</title>

  <!-- 外部樣式表 -->
  <link rel="stylesheet" href="/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Noto+Sans+TC&family=Noto+Serif+TC:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    html, body {
      overflow: hidden;
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      margin: 0;
      padding: 0;
      touch-action: pan-y;
      background-color: #ffe6f0;
    }

    * {
      box-sizing: border-box;
    }

    .stage-screen {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      min-height: 100dvh;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    .responsive-wrapper {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .bg {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover; /* ✅ 滿版鋪滿背景 */
      object-position: center;
      z-index: 0;
      background-color: #ffe6f0;
      transition: all 0.3s ease;
    }

    @media (max-width: 480px) {
      .responsive-wrapper {
        background-image: url('/images/手機2.png');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-color: #ffe6f0;
      }
    }

    .content {
      position: absolute;
      z-index: 1;
      left: 0;
      width: 100%;
      top: 50%;
      transform: translateY(-50%);
      padding: 0 6vw;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    @media (max-width: 480px) {
      .content {
        top: 52%;
        padding: 0 6vw;
      }
    }

    .field-label {
      width: min(90vw, 620px);
      text-align: left;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: clamp(13px, 2vw, 17px);
      color: #4e669e;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .input-single, .input-select {
      width: min(90vw, 620px);
      font-size: clamp(14px, 2.5vw, 20px);
      padding: 10px 12px;
      border: 2px solid rgba(141, 164, 223, 0.8);
      background-color: rgba(255, 255, 255, 0.45);
      border-radius: 14px;
      margin-bottom: 2px;
      box-shadow: 0 8px 20px rgba(111, 144, 224, 0.2);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }
    .input-box {
      width: min(90vw, 620px);
      height: min(40vh, 320px);
      font-size: clamp(14px, 2.5vw, 24px);
      padding: 16px;
      border: 2px solid rgba(141, 164, 223, 0.8);
      background-color: rgba(255, 255, 255, 0.45);
      resize: none;
      box-shadow: 0 12px 24px rgba(111, 144, 224, 0.22);
      margin-bottom: 6px;
      border-radius: 18px;
      color: #40507c;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }
    .input-box::placeholder,
    .input-single::placeholder {
      color: rgba(64, 80, 124, 0.55);
    }


    #submit-btn {
      width: min(86vw, 520px);
      height: 74px;
      margin-top: 8px;
      font-family: 'Baloo 2', 'Noto Sans TC', sans-serif;
      font-size: clamp(24px, 4vw, 46px);
      font-weight: 700;
      letter-spacing: 1px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.88) 0%, rgba(240, 245, 255, 0.92) 100%);
      border: 3px solid #9eb5e7;
      border-radius: 999px;
      color: #4f73b8;
      box-shadow: 0 8px 0 #90a8dd, 0 12px 28px rgba(119, 151, 223, 0.28);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    #submit-btn::before {
      content: "📖💗";
      font-size: 26px;
    }
    #submit-btn:hover {
      transform: translateY(-1px);
    }
    #submit-btn:active {
      transform: translateY(2px);
      box-shadow: 0 6px 0 #90a8dd, 0 9px 18px rgba(119, 151, 223, 0.24);
    }
    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <main class="stage-screen">
    <div class="background-layer"></div>

    <button id="gavel-btn" class="gavel-hitbox" aria-label="提交審判"></button>

    <!-- 🏛 主畫面 -->
    <div class="responsive-wrapper">
      <div class="content">
        <label for="accused" class="field-label">控訴對象（選填）</label>
        <input type="text" id="accused" class="input-single" placeholder="可留空；有對象再填暱稱即可" />

        <label for="complaint" class="field-label">戀愛心事（必填，不限抱怨）</label>
        <textarea id="complaint" class="input-box" placeholder="說說你的戀愛心事、糾結或想被聽見的心情…"></textarea>

        <button id="submit-btn" class="submit-btn hidden-submit">審判！</button>
      </div>
    </div>
 
<!-- ⚖️ 判決畫面 -->
<div id="verdict-screen" class="verdict-popup hidden">
  <div id="verdict-capture">
   <div id="loading-animation" class="loading hidden">⚖️ 正在審判中...</div>
   <div id="verdict-text" class="hidden">
     <div class="verdict-text-inner">
     <p class="verdict-title">戀愛判決書</p>
     <p class="verdict-psych"></p>
     <p class="verdict-crime"></p>
     <p class="verdict-suggestion"></p>
     <p class="verdict-judgement"></p>

     <div id="recommended-music" class="recommended-music hidden">
       <p class="recommended-music-text">現在的心情適合聆聽...</p>
       <a
         id="recommended-music-link"
         class="recommended-music-link"
         href="https://linktr.ee/Yutin_Huang"
         target="_blank"
         rel="noopener noreferrer"
       >
         <img id="recommended-music-cover" class="recommended-music-cover" alt="歌曲封面" />
         <p id="recommended-music-title" class="recommended-music-title"></p>
       </a>
      <audio id="recommended-music-audio" preload="auto" playsinline webkit-playsinline></audio>
     </div>
  

    <!-- ✅ 新增按鈕區塊 -->
     <div class="verdict-buttons">
       <button id="retry-btn" class="retry-btn hidden">再上訴！</button>
       <button id="mediation-apply-btn" class="mediation-apply-btn hidden">申請調停</button>
       <a href="https://linktr.ee/Yutin_Huang" target="_blank" class="listen-btn">前往收聽</a>
     </div>

     <div id="mediation-link-container" class="mediation-link-container hidden"></div>
     </div>
    </div>
    <div class="verdict-export-bar">
      <button
        type="button"
        id="verdict-export-btn"
        class="verdict-export-btn hidden"
        aria-label="下載判決結果"
        title="下載判決結果"
      >
        ⬇
      </button>
      <button
        type="button"
        id="verdict-share-btn"
        class="verdict-share-btn hidden"
        aria-label="分享判決"
        title="分享"
      >
        ↗
      </button>
    </div>
  </div>

  <div
    id="verdict-share-modal"
    class="verdict-share-modal hidden"
    aria-hidden="true"
  >
    <div class="verdict-share-backdrop" aria-hidden="true"></div>
    <div class="verdict-share-panel" role="dialog" aria-labelledby="verdict-share-title">
      <p id="verdict-share-title" class="verdict-share-title">分享判決</p>
      <p class="verdict-share-hint">
        部分 App 需先下載圖片再貼上；連結為本頁網址。
      </p>
      <div class="verdict-share-actions">
        <button type="button" class="verdict-share-option" data-share-target="fb-feed">
          Facebook 動態
        </button>
        <button type="button" class="verdict-share-option" data-share-target="ig-story">
          Instagram 限時動態
        </button>
        <button type="button" class="verdict-share-option" data-share-target="fb-messenger">
          Facebook Messenger
        </button>
        <button type="button" class="verdict-share-option" data-share-target="ig-dm">
          Instagram 訊息
        </button>
      </div>
      <button type="button" class="verdict-share-cancel">取消</button>
    </div>
  </div>
</div>

<!-- ⚖️ 調停畫面（token 進入） -->
<div id="mediation-screen" class="mediation-screen hidden">
  <div id="mediation-container">
    <div id="mediation-loading" class="loading hidden">⚖️ 正在產生和解書...</div>
    <div id="mediation-content" class="hidden">
      <div class="mediation-page-heading">
        <p class="verdict-title">戀愛和解書</p>
        <p id="mediation-status" class="verdict-psych"></p>
      </div>

      <div id="mediation-section-created" class="hidden">
        <p id="mediation-accusation-title" class="verdict-suggestion"></p>
        <div id="mediation-softened-story" class="mediation-story"></div>

        <label for="mediation-response" class="mediation-label">你的答辯</label>
        <textarea id="mediation-response" class="input-box" placeholder="請被告提供陳述或回覆"></textarea>
        <button id="mediation-respond-btn" class="mediation-respond-btn">生成戀愛和解書</button>
      </div>

      <div id="mediation-section-responded" class="hidden">
        <div
          id="mediation-recommended-music"
          class="recommended-music mediation-recommended-music hidden"
        >
          <p class="recommended-music-text">現在的心情適合聆聽...</p>
          <a
            id="mediation-recommended-music-link"
            class="recommended-music-link"
            href="https://linktr.ee/Yutin_Huang"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img
              id="mediation-recommended-music-cover"
              class="recommended-music-cover"
              alt="歌曲封面"
            />
            <p id="mediation-recommended-music-title" class="recommended-music-title"></p>
          </a>
          <audio
            id="mediation-recommended-music-audio"
            preload="auto"
            playsinline
            webkit-playsinline
          ></audio>
        </div>

        <div id="mediation-settlement-head" class="mediation-settlement-head">
          <div id="mediation-case-summary-wrap" class="mediation-case-summary-wrap hidden">
            <p class="mediation-case-summary-label">案件摘要</p>
            <div id="mediation-case-summary" class="mediation-case-summary"></div>
          </div>
        </div>
        <div id="mediation-settlement-text" class="mediation-settlement"></div>
      </div>

      <button id="mediation-back-btn" class="mediation-back-btn" type="button">回到首頁</button>
      <div class="mediation-bottom-spacer" aria-hidden="true"></div>
    </div>
  </div>
</div>


    <!-- 🔊 音效 -->
    <audio id="home-bg-audio" preload="auto" playsinline webkit-playsinline></audio>
    <audio id="sound-effect" preload="auto" playsinline webkit-playsinline>
      <source src="/dream%202%20.wav" type="audio/wav" />
    </audio>

    <script
      src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"
      defer
    ></script>
    <!-- 🔧 JavaScript -->
    <script src="script.js" defer></script>
  </main>
</body>
</html>
